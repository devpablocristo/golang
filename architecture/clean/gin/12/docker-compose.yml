version: "3.7"
services:
  meli-items:
    container_name: app-meli-items
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080" # locat port : container port
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - .:/app/data
    networks:
      - items_net

  mysql:
    container_name: mysql-meli-items
    image: mysql:5.7
    build:
      context: .
      dockerfile: Dockerfile.mysql
    restart: always
    ports:
      - "3306:3306" # locat port : container port
    environment:
      MYSQL_DATABASE: meli_items
      MYSQL_USER: tester
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes: # we mount a data volume to make sure we don't lose data
      - mysql-data:/var/lib/mysql # Where our data will be persisted
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - items_net

  # se agrega el servicio de phpMyAdmin
  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin:5.1.1
    restart: always
    ports:
      - "9090:80"
    environment:
      PMA_HOST: mysql-meli-items
      MYSQL_ROOT_PASSWORD: secret
    networks:
      - items_net

networks:
  items_net:
    driver: bridge

volumes:
  mysql-data:
