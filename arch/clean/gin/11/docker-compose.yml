version: '3'
services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "9000:8080" # locat port : container port
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - .:/app/data
  mysql:
    container_name: mysql-repo
    # platform: linux/arm64/v8
    # platform: linux/x86_64
    image: mysql:5.7
    # image: mysql:8.0
    # image: arm64v8/mysql:8.0
    build:
      context: .
      dockerfile: Dockerfile.mysql
    networks:
      - default
    restart: always
    ports:
      - "3306:3306" # locat port : container port
    expose:
      - '3306'  # Opens port 3306 on the container
    environment:
      MYSQL_DATABASE: items
      MYSQL_USER: tester
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes: # we mount a data volume to make sure we don't lose data
      - mysql-data:/var/lib/mysql # Where our data will be persisted
    command: --default-authentication-plugin=mysql_native_password

  # se agrega el servicio de phpMyAdmin
  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin:5.1.1
    restart: always
    ports:
      - "9090:80"
    environment:
      PMA_HOST: mysql-repo
      MYSQL_ROOT_PASSWORD: secret

networks:
  default:

volumes:
  mysql-data:







