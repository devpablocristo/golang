version: '3.7'

services:
  db:
    container_name: mysql-test
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.mysql
    networks:
      - default
    ports:
      - "${MYSQL_HOST_PORT:-3307}:${MYSQL_CONT_PORT:-3306}"
    expose:
      - ${MYSQL_HOST_PORT:-3307}
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-test}"
      MYSQL_USER: "${MYSQL_USERNAME:-tester}"
      MYSQL_PASSWORD: "${MYSQL_USER_PASSWORD:-test}"
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    container_name: api-test
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - 9999:8888  # Puerto para Postman
    expose:
      - 9999
    depends_on:
      - db
    volumes:
      #- ./cmd:/app
      - ./:/app

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    container_name: phpmyadmin-test
    links:
      - db
    restart: always
    environment:
      - PMA_HOST="${MYSQL_CONT:-db}" #nombre del server "db" en este caso
      - PMA_PORT="${MYSQL_HOST_PORT:-3307}"
      - PMA_ARBITRARY=1
      - MYSQL_ROOT_PASSWORD="${MYSQL_ROOT_PASSWORD:-root}"
    ports:
      - "${PHPMYADMIN_HOST_PORT:-9090}:${PHPMYADMIN_CONT_PORT:-80}"

networks:
  default:

volumes:
  mysql_data:
